# =============================================================================
# TAOS Project Configuration
# =============================================================================
# Copy this file into your project directory and fill in the fields marked
# REQUIRED. Everything else can be left blank to inherit the machine default
# from taos/machines.yaml.
#
# Override rule: a blank value ("") defers to the machine default. Set a
# non-blank value here only when you need project-specific behavior.
#
# Usage:
#   python show_config.py            # print all resolved values
#   python check_paths.py            # check which paths exist on disk
# =============================================================================

# --- Project identity --------------------------------------------------------

project:
  name:      "2026-STRONG-CA"
  timestamp: "20260505"

# --- Grid configuration ------------------------------------------------------

grid:
  name: ""               # set per-grid in grids: list below

  # Component grids — shared across all grids unless overridden in grids: list
  ocn_name: ""
  ocn_file: ""
  lnd_name: ""
  lnd_file: ""

  # SPA grid — optional, only needed for EAMxx SPA maps (defaults to <name>pg2)
  spa_name: ""
  spa_file: ""

  # Use homme_tool for np4 SCRIP generation (instead of pure-Python path)
  homme_np4_scrip:  false

grids:

  # grid version notes:
  #   v1 - inner refinement follows CA coastline - include wide intermediate resolution buffer
  #   v2 - same as v1 but w/o the buffer

  # ne32 base w/ 5x refinement => dx-pg2 ~ 4-175 km
  - name: "STRONG-CA-32x5-v1"
    # grid_file_exodus: ${grid_root}/STRONG-CA-32x5-v1.g
  - name: "STRONG-CA-32x5-v2"
    # grid_file_exodus: ${grid_root}/STRONG-CA-32x5-v2.g

  # # ne128 base w/ 3x refinement => dx-pg2 ~ 4-44 km
  # - name: "STRONG-CA-128x3-v1"
  #   grid_file_exodus: ${grid_root}/STRONG-CA-128x3-v1.g
  # - name: "STRONG-CA-128x3-v2"
  #   grid_file_exodus: ${grid_root}/STRONG-CA-128x3-v2.g

# --- Machine override (optional) ---------------------------------------------
# Set name only if auto-detection fails or you need to force a specific machine.
# Auto-detection probes known HPC paths; valid values: NERSC, LCRC, ALCF, OLCF.

machine:
  name: ""

# --- Path overrides (optional) -----------------------------------------------
# All values below default to "" (use machine default from taos/machines.yaml).

paths:
  grid_code_root:  ""
  grid_data_root:  ""
  e3sm_src_root:   ""
  DIN_LOC_ROOT:    ""
  unified_bin:     ""
  unified_src:     ""
  homme_tool_root: ""
  mbda_path:       ""
  topo_file_src:   ""

# --- Per-machine overrides (optional) -----------------------------------------
# The block matching the active machine is applied over the generic paths/slurm
# sections above, so machine-specific values here take effect automatically —
# no commenting/uncommenting needed when switching machines. Blank values defer
# as usual to the machine defaults in taos/machines.yaml.

machines:
  NERSC:
    paths:
      grid_data_root: "/global/cfs/cdirs/m5277/whannah"
      # topo_file_src:  "/global/cfs/cdirs/e3sm/zhang73/grids2/topo30s/usgs-rawdata.nc"
      topo_file_src:  "/global/cfs/cdirs/e3sm/zhang73/grids2/topo7.5s/GMTED2010_7.5_stitch_S5P_OPER_REF_DEM_15_NCL_24-3.r172800x86400.nc"
    slurm:
      account: "m5277"
  # OLCF:
  #   paths:
  #     grid_data_root: "/lustre/orion/cli115/proj-shared/$USER/TAOS"
  #     topo_file_src:   "/lustre/orion/cli115/proj-shared/hannah6/TAOS/high-res-topo/GMTED2010_7.5_stitch_S5P_OPER_REF_DEM_15_NCL_24-3.r172800x86400.nc"
  #   slurm:
  #     account: "cli115"

# --- Topo options ------------------------------------------------------------

topo:
  # Set to false to use the original homme_tool topo_pgn_to_smoothed instead of
  # the Python SEM smoother. Requires paths.homme_tool_root to be set.
  use_python_smooth: true
  # Set to true to force the pure-Python disk-averaged remap even when
  # paths.mbda_path is set. Useful for quick login-node tests. The Python
  # fallback is automatically used when paths.mbda_path is empty. Note: the
  # 3km intermediate file still requires the compiled MBDA binary.
  use_python_mbda: false

# --- SLURM overrides (optional) ----------------------------------------------

slurm:
  mail_user:  ""
  mail_type:  ""
  account:    ""    # set per-machine in machines: section above
  constraint: ""
  qos:        ""
